services:
  jenkins:
    build:
      context: ./jenkins
    image: webtaku-jenkins:latest
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:50000:50000"
    environment:
      JENKINS_OPTS: "--prefix=/jenkins"
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true -Xmx1g"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/webtaku:/opt/webtaku
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  jenkins_home:
